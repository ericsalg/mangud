<!DOCTYPE html>
<html>
<head>
    <title>Lõpmatu Auto Mäng - Takistustega</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { border: 5px solid #555; background: #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>SKOOR: <span id="score">0</span></h1>
        <p>JUHTIMINE: ← JA → NOOLED</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    canvas.width = 400;
    canvas.height = 600;

    // Mängu seaded
    let score = 0;
    let roadOffset = 0;
    let isGameOver = false;

    // Sinu auto
    const carWidth = 40;
    const carHeight = 70;
    let carX = canvas.width / 2 - carWidth / 2;
    const carY = canvas.height - 120;
    const carSpeed = 6;

    // Takistused (teised autod)
    let obstacles = [];
    const obstacleSpeed = 4;
    let frameCount = 0;

    let keys = {};
    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    // Skoor kasvab iga sekund
    setInterval(() => {
        if (!isGameOver) {
            score++;
            scoreElement.innerText = score;
        }
    }, 1000);

    function spawnObstacle() {
        const x = Math.random() * (canvas.width - carWidth - 40) + 20;
        obstacles.push({ x: x, y: -carHeight });
    }

    function resetGame() {
        score = 0;
        scoreElement.innerText = 0;
        obstacles = [];
        carX = canvas.width / 2 - carWidth / 2;
        isGameOver = false;
        draw();
    }

    function draw() {
        if (isGameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("NEEGER OLED!", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Arial";
            ctx.fillText("Vajuta F5 uuesti alustamiseks", canvas.width / 2, canvas.height / 2 + 40);
            return;
        }

        // 1. Joonista tee
        ctx.fillStyle = "#444";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Tee märgistus
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 5;
        ctx.setLineDash([40, 20]);
        ctx.lineDashOffset = -roadOffset;
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        roadOffset += 8;

        // 2. Juhtimine
        if (keys["ArrowLeft"] && carX > 20) carX -= carSpeed;
        if (keys["ArrowRight"] && carX < canvas.width - carWidth - 20) carX += carSpeed;

        // 3. Sinu auto joonistamine
        ctx.fillStyle = "#42f5f5"; // Punane
        ctx.fillRect(carX, carY, carWidth, carHeight);
        ctx.fillStyle = "TEAL"; // Aken
        ctx.fillRect(carX + 5, carY + 10, carWidth - 10, 15);

        // 4. Takistuste haldus
        frameCount++;
        if (frameCount % 80 === 0) spawnObstacle(); // Tekita uus auto iga ~1.5 sek järel

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.y += obstacleSpeed;

            // Joonista takistus (Sinine auto)
            ctx.fillStyle = "#f5e042";
            ctx.fillRect(obs.x, obs.y, carWidth, carHeight);
            ctx.fillStyle = "white";
            ctx.fillRect(obs.x + 5, obs.y + carHeight - 25, carWidth - 10, 15);

            // KOKKUPÕRKE TUVASTUS
            if (carX < obs.x + carWidth &&
                carX + carWidth > obs.x &&
                carY < obs.y + carHeight &&
                carY + carHeight > obs.y) {
                isGameOver = true;
            }

            // Eemalda ekraanilt väljunud autod
            if (obs.y > canvas.height) {
                obstacles.splice(i, 1);
                i--;
            }
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
